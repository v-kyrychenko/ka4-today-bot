#        AllowHeaders:
#          - Content-Type
#          - Authorization
#        MaxAge: 86400

  Ka4TodayTelegramWebhook:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: ka4today-telegram-webhook-handler
      Handler: src/modules/telegram/handlers/ka4TodayTelegramWebhook.handler
      CodeUri: .
      Events:
        Webhook:
          Type: HttpApi
          Properties:
            Path: /ka4-today-webhook
            Method: POST
      Policies:
        - AWSLambdaBasicExecutionRole
        - Statement:
            Effect: Allow
            Action:
              - sqs:SendMessage
            Resource: !GetAtt MainMessageQueue.Arn
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        EntryPoints:
          - src/modules/telegram/handlers/ka4TodayTelegramWebhook.ts
        Format: cjs
        Minify: false
        Sourcemap: false
        Target: es2022

  TelegramMiniAppApi:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: ka4today-telegram-miniapp-api
      Handler: src/modules/telegram/api/index.handler
      CodeUri: .
      VpcConfig:
        SecurityGroupIds:
          - !ImportValue
              'Fn::Sub': '${NetworkStackExportPrefix}-LambdaSecurityGroupId'
        SubnetIds:
          - !ImportValue
              'Fn::Sub': '${NetworkStackExportPrefix}-PrivateSubnetId'
      Events:
        CreateBodyMeasurements:
          Type: HttpApi
          Properties:
            #ApiId: !Ref UiApiConfig
            Path: /tg/body-measurements
            Method: POST
      Policies:
        - AWSLambdaBasicExecutionRole
        - AWSLambdaVPCAccessExecutionRole
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        EntryPoints:
          - src/modules/telegram/api/index.ts
        Format: cjs
        Minify: false
        Sourcemap: false
        Target: es2022
