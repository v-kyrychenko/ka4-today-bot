AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: ka4-today-bot – Telegram + OpenAI notification Lambda bot

Globals:
  Function:
    Runtime: nodejs22.x
    Timeout: 120
    MemorySize: 512
    VpcConfig:
      SecurityGroupIds:
        - !ImportValue
            'Fn::Sub': '${NetworkStackExportPrefix}-LambdaSecurityGroupId'
      SubnetIds:
        - !ImportValue
            'Fn::Sub': '${NetworkStackExportPrefix}-PrivateSubnetId'
    Environment:
      Variables:
        #TODO move to esolve:ssm-secure
        TELEGRAM_BOT_TOKEN: !Ref TelegramBotToken
        #TODO move to esolve:ssm-secure
        TELEGRAM_SECURITY_TOKEN: !Ref TelegramSecurityToken
        #TODO move to esolve:ssm-secure
        OPENAI_API_KEY: !Ref OpenAiToken
        OPENAI_PROJECT_ID: !Ref OpenAiProjectId
        MAIN_MESSAGE_QUEUE_URL: !Ref MainMessageQueue
        POSTGRES_HOST: !ImportValue
          'Fn::Sub': '${NetworkStackExportPrefix}-PostgresHost'
        POSTGRES_PORT: !ImportValue
          'Fn::Sub': '${NetworkStackExportPrefix}-PostgresPort'
        POSTGRES_DB: !ImportValue
          'Fn::Sub': '${NetworkStackExportPrefix}-PostgresDb'
        POSTGRES_USER: !ImportValue
          'Fn::Sub': '${NetworkStackExportPrefix}-PostgresUser'
        POSTGRES_PASSWORD: !Sub '{{resolve:ssm-secure:${PostgresPasswordParameterName}}}'
        POSTGRES_SSL: !Ref PostgresSsl

Parameters:
  TelegramBotToken:
    Type: String
    Description: Telegram bot token from BotFather
    NoEcho: true
  TelegramSecurityToken:
    Type: String
    Description: Token used to validate incoming webhook requests
    NoEcho: true
  OpenAiToken:
    Type: String
    Description: OpenAI API key (starts with sk-...)
    NoEcho: true
  OpenAiProjectId:
    Type: String
    Description: Project ID from OpenAI (starts with proj-...)
    NoEcho: true
  NetworkStackExportPrefix:
    Type: String
    Description: Export name prefix used by the standalone network-postgres-nat stack
    Default: ka4today
  PostgresPasswordParameterName:
    Type: String
    Description: SSM SecureString parameter name containing the PostgreSQL password
    Default: /ka4today/postgres/app-password
  PostgresSsl:
    Type: String
    Description: Whether PostgreSQL SSL is enabled
    Default: "false"

Resources:
  #####################################################################
  ##                         Bot                                     ##
  #####################################################################
  Ka4TodayTelegramWebhook:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: ka4today-telegram-webhook-handler
      Handler: src/modules/telegram/handlers/ka4TodayTelegramWebhook.handler
      CodeUri: .
      Events:
        Webhook:
          Type: HttpApi
          Properties:
            Path: /ka4-today-webhook
            Method: POST
      Policies:
        - AWSLambdaBasicExecutionRole
        - AWSLambdaVPCAccessExecutionRole
        - Statement:
            Effect: Allow
            Action:
              - sqs:SendMessage
            Resource: !GetAtt MainMessageQueue.Arn
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        EntryPoints:
          - src/modules/telegram/handlers/ka4TodayTelegramWebhook.ts
        Format: cjs
        Minify: false
        Sourcemap: false
        Target: es2022

  Ka4TodayAsyncTelegramProcessor:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: ka4today-async-telegram-processor
      Handler: src/modules/telegram/handlers/asyncTelegramProcessor.handler
      CodeUri: .
      Events:
        MessageQueueEvent:
          Type: SQS
          Properties:
            Queue: !GetAtt MainMessageQueue.Arn
            BatchSize: 1
            MaximumBatchingWindowInSeconds: 0
            ScalingConfig:
              MaximumConcurrency: 2
      Policies:
        - AWSLambdaBasicExecutionRole
        - AWSLambdaVPCAccessExecutionRole
        - Statement:
            Effect: Allow
            Action:
              - sqs:ReceiveMessage
              - sqs:DeleteMessage
              - sqs:GetQueueAttributes
            Resource: !GetAtt MainMessageQueue.Arn
        - Statement:
            Sid: ReadExerciseImages
            Effect: Allow
            Action:
              - s3:GetObject
              - s3:HeadObject
            Resource: arn:aws:s3:::ka4-today-exercises/exercises/*
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        EntryPoints:
          - src/modules/telegram/handlers/asyncTelegramProcessor.ts
        Format: cjs
        Minify: false
        Sourcemap: false
        Target: es2022

  Ka4TodayCronDailyMessageFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: ka4today-cron-daily-message
      Handler: src/modules/telegram/handlers/cronDailyMessage.handler
      CodeUri: .
      Events:
        DailySchedule:
          Type: Schedule
          Properties:
            Schedule: cron(0 3 ? * 2-7 *)  # 2:00 UTC = 5:00 by Kyiv (summer), 03:00 UTC = 05:00 Kyiv (winter)
            #Schedule: rate(3 minutes)
            Enabled: true
      Policies:
        - AWSLambdaBasicExecutionRole
        - AWSLambdaVPCAccessExecutionRole
        - Statement:
            Effect: Allow
            Action:
              - sqs:SendMessage
            Resource: !GetAtt MainMessageQueue.Arn
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        EntryPoints:
          - src/modules/telegram/handlers/cronDailyMessage.ts
        Format: cjs
        Minify: false
        Sourcemap: false
        Target: es2022

  #####################################################################
  ##                         LogGroups                               ##
  #####################################################################
  TelegramWebhookLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/lambda/ka4today-telegram-webhook-handler
      RetentionInDays: 7
  Ka4TodayAsyncTelegramProcessorLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/lambda/ka4today-async-telegram-processor
      RetentionInDays: 7
  CronDailyMessageLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/lambda/ka4today-cron-daily-message
      RetentionInDays: 7
  HttpApiClientRoutesLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/lambda/ka4today-http-api-client-routes
      RetentionInDays: 7
  HttpApiExerciseRoutesLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/lambda/ka4today-http-api-exercise-routes
      RetentionInDays: 7

  #####################################################################
  ##                         SQS                                     ##
  #####################################################################
  MainMessageDeadLetterQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: ka4today-main-message-dlq

  MainMessageQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: ka4today-main-message-queue
      VisibilityTimeout: 300 #  Queue visibility timeout should be > Lambda execution timeout
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt MainMessageDeadLetterQueue.Arn
        maxReceiveCount: 5

  #####################################################################
  ##                        UI API                                   ##
  #####################################################################
  HttpApiClientRoutes:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: ka4today-http-api-client-routes
      Handler: src/modules/coach/client/api/index.handler
      CodeUri: .
      Events:
        GetClients:
          Type: HttpApi
          Properties:
            Path: /coaches/{id}/clients
            Method: GET
        GetClientById:
          Type: HttpApi
          Properties:
            Path: /coaches/{id}/clients/{clientId}
            Method: GET
        CreateClient:
          Type: HttpApi
          Properties:
            Path: /coaches/{id}/clients
            Method: POST
        UpdateClient:
          Type: HttpApi
          Properties:
            Path: /coaches/{id}/clients/{clientId}
            Method: PUT
      Policies:
        - AWSLambdaBasicExecutionRole
        - AWSLambdaVPCAccessExecutionRole
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        EntryPoints:
          - src/modules/coach/client/api/index.ts
        Format: cjs
        Minify: false
        Sourcemap: false
        Target: es2022

  HttpApiExerciseRoutes:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: ka4today-http-api-exercise-routes
      Handler: src/modules/coach/exercise/api/index.handler
      CodeUri: .
      Events:
        GetExercise:
          Type: HttpApi
          Properties:
            Path: /exercises
            Method: GET
      Policies:
        - AWSLambdaBasicExecutionRole
        - AWSLambdaVPCAccessExecutionRole
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        EntryPoints:
          - src/modules/coach/exercise/api/index.ts
        Format: cjs
        Minify: false
        Sourcemap: false
        Target: es2022
